<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostgreSQL API Demo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #38bdf8; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 6px; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
        pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; color: #4ade80; border: 1px solid #334155; height: 300px; }
        .status { margin-top: 10px; font-size: 0.9em; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 API Demo Dashboard</h1>
        <div class="button-group">
            <button onclick="runCall('/api/products', 'GET')">📦 GET /api/products</button>
            <button onclick="runCall('/api/reports/trend', 'GET')">📈 GET /api/reports/trend</button>
            <button onclick="runCall('/api/demo/isolation', 'GET')">🛡️ GET /api/demo/isolation</button>
            <button onclick="createOrder()">🛒 POST /api/orders</button>
        </div>
        <div class="status" id="status">Ready.</div>
        <pre id="output">// JSON Response will appear here...</pre>
    </div>

    <script>
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        async function runCall(url, method) {
            status.innerText = `Calling ${method} ${url}...`;
            try {
                const res = await fetch('http://localhost:3000' + url);
                const data = await res.json();
                output.innerText = JSON.stringify(data, null, 2);
                status.innerText = `Success: ${url}`;
            } catch (err) {
                output.innerText = 'Error: ' + err.message;
                status.innerText = 'Failed.';
            }
        }

        async function createOrder() {
            status.innerText = 'Creating order...';
            try {
                const res = await fetch('http://localhost:3000/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_name: "Demo User",
                        items: [{ product_id: 1, quantity: 1 }]
                    })
                });
                const data = await res.json();
                output.innerText = JSON.stringify(data, null, 2);
                status.innerText = 'Order Created Successfully.';
            } catch (err) {
                output.innerText = 'Error: ' + err.message;
                status.innerText = 'Failed.';
            }
        }
    </script>
</body>
</html>
